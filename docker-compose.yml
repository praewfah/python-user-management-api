services:
  db:
    image: postgres:16-alpine
    container_name: user-management-api-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_management_api
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_management_api"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: .
    container_name: user-management-api-api
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/user_management_api
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
